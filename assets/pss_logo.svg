<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 65" width="100%" height="100%">
    <!-- Custom Abstract Monogram Icon (forming PSS using stylized soundwaves in pure white) -->
    <g transform="translate(5, 5)">
        <!-- Outer groove circle (glowing and futuristic) -->
        <circle cx="28" cy="25" r="22" fill="none" stroke="white" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.3" />
        
        <!-- Stylized "P" -->
        <rect x="12" y="14" width="3.5" height="22" rx="1.75" fill="white" />
        <path d="M 15.5 16 h 5.5 a 4.5 4.5 0 0 1 0 9 h -5.5" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
        
        <!-- Stylized "S" (First) -->
        <path d="M 32 16 c -3 0 -5 2 -5 5.5 c 0 5 5 3.5 5 9 c 0 3 -2 5.5 -5 5.5" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
        
        <!-- Stylized "S" (Second) -->
        <path d="M 42 16 c -3 0 -5 2 -5 5.5 c 0 5 5 3.5 5 9 c 0 3 -2 5.5 -5 5.5" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- Logo Brand Name Typography (Monochrome White) -->
    <text x="65" y="32" font-family="'DM Sans', 'Inter', 'Helvetica Neue', sans-serif" font-size="21" font-weight="900" fill="white" letter-spacing="-0.5px">
        PSS<tspan fill="white">.</tspan>
    </text>
    <text x="112" y="32" font-family="'DM Sans', 'Inter', 'Helvetica Neue', sans-serif" font-size="21" font-weight="400" fill="white" letter-spacing="-0.5px">
        Player
    </text>

    <!-- Subtitle Signature Tag (Made by Vidit singh sisodia) -->
    <text x="65" y="47" font-family="'DM Sans', 'Inter', 'Helvetica Neue', sans-serif" font-size="9.5" font-weight="500" fill="#b3b3b3" letter-spacing="0.5px" opacity="0.8">
        made by Vidit singh sisodia
    </text>
</svg>
