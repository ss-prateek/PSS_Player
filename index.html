<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="style.css?v=10">
    <link rel="stylesheet" href="utilities.css?v=3">
</head>

<body>

    <!-- Glowing Floating Ambient Blobs in Background (Shared globally behind player and login) -->
    <div class="login-bg-blob blob-1"></div>
    <div class="login-bg-blob blob-2"></div>
    <div class="login-bg-blob blob-3"></div>

    <!-- Full-Screen Login Overlay (Monochrome Theme) -->
    <div id="login-overlay"
        style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: transparent; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease, visibility 0.5s ease; opacity: 1; visibility: visible; overflow: hidden;">
        <div
            style="background: rgba(18, 18, 18, 0.82); border: 1px solid #282828; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 40px; border-radius: 15px; width: 320px; display: flex; flex-direction: column; align-items: center; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 10; position: relative;">
            <img src="assets/pss_logo.svg" alt="PSS Player Logo" style="height: 50px; margin-bottom: 10px;">
            <h2 style="font-size: 18px; font-weight: bold; color: white; margin: 0; text-align: center;">Welcome to PSS
                Player</h2>
            <p
                style="font-size: 11px; color: #b3b3b3; margin: -10px 0 10px 0; text-align: center; font-weight: normal;">
                Please enter your details to start listening.</p>

            <div style="width: 100%; display: flex; flex-direction: column; gap: 5px;">
                <label
                    style="font-size: 10px; color: #b3b3b3; text-transform: uppercase; letter-spacing: 0.5px; font-weight: bold;">Name</label>
                <input type="text" id="login-name" placeholder="Your Name"
                    style="background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: white; padding: 10px; outline: none; font-size: 13px; font-weight: normal; transition: border-color 0.2s;"
                    onfocus="this.style.borderColor='white'" onblur="this.style.borderColor='#444'">
            </div>

            <div style="width: 100%; display: flex; flex-direction: column; gap: 5px;">
                <label
                    style="font-size: 10px; color: #b3b3b3; text-transform: uppercase; letter-spacing: 0.5px; font-weight: bold;">Email
                    Address</label>
                <input type="email" id="login-email" placeholder="email@example.com"
                    style="background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: white; padding: 10px; outline: none; font-size: 13px; font-weight: normal; transition: border-color 0.2s;"
                    onfocus="this.style.borderColor='white'" onblur="this.style.borderColor='#444'">
            </div>

            <div id="login-error"
                style="color: #ff4d4d; font-size: 11px; text-align: center; display: none; font-weight: normal;">Please
                fill all fields correctly.</div>

            <button id="login-submit-btn"
                style="width: 100%; background: white; border: none; color: black; font-weight: bold; padding: 12px; border-radius: 25px; cursor: pointer; font-size: 13px; transition: transform 0.2s, background 0.2s;"
                onmouseover="this.style.transform='scale(1.02)'; this.style.background='#e6e6e6';"
                onmouseout="this.style.transform='scale(1)'; this.style.background='white';">Enter Player</button>
        </div>
    </div>

    <div class="container flex">

        <div class="left">

            <button id="close-sidebar-btn" style="display: none;">←</button>

            <div class="home bg-ele border">
                <div class="logo" style="padding: 15px 15px 5px 15px; display: flex; align-items: center;">
                    <img id="logo" src="assets/pss_logo.svg" alt="PSS Player Logo" style="height: 45px;">
                </div>
                <ul style="padding: 0 0 15px 15px;">
                    <li>
                        <a href="https://github.com/ss-vidit" target="_blank" rel="noopener noreferrer"
                            style="text-decoration: none; color: #b3b3b3; display: flex; align-items: center; gap: 15px; width: 100%; transition: color 0.2s;"
                            onmouseover="this.style.color='white'" onmouseout="this.style.color='#b3b3b3'">
                            <!-- GitHub SVG Icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                viewBox="0 0 16 16" style="vertical-align: middle;">
                                <path
                                    d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z" />
                            </svg>
                            <span>GitHub</span>
                        </a>
                    </li>
                    <li>
                        <a href="https://www.linkedin.com/in/viditsinghsisodia/" target="_blank"
                            rel="noopener noreferrer"
                            style="text-decoration: none; color: #b3b3b3; display: flex; align-items: center; gap: 15px; width: 100%; transition: color 0.2s;"
                            onmouseover="this.style.color='white'" onmouseout="this.style.color='#b3b3b3'">
                            <!-- LinkedIn SVG Icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                viewBox="0 0 16 16" style="vertical-align: middle;">
                                <path
                                    d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854zm4.943 12.248V6.169H2.542v7.225zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248S2.4 3.226 2.4 3.934c0 .694.521 1.248 1.327 1.248zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016l.016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225z" />
                            </svg>
                            <span>LinkedIn</span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="library bg-ele border">
                <!-- Upper part -->
                <ul class="line1">
                    <li><img src="assets/playlist.svg" alt=""> Your Library</li>
                </ul>
                <ul class="line3">
                    <li>Recent <img src="assets/recent.svg" alt=""></li>
                </ul>

                <!-- Lower Part: Dynamic Recently Played List -->
                <div class="playlists">
                    <ul id="recently-played-list">
                        <!-- Default placeholder item shown when page first loads -->
                        <li style="cursor: default; background: transparent; color: #b3b3b3;">
                            <img src="assets/playlist.svg" alt="" style="filter: opacity(0.5);">
                            <span>No songs played yet</span>
                        </li>
                    </ul>
                </div>
            </div>

        </div>

        <div class="middle border">

            <div class="header bg-ele">

                <!-- Hamburger Menu Button (hidden on desktop, shown on mobile/tablets) -->
                <button class="hamburger-btn" id="hamburger-btn"
                    style="display: none; background: transparent; border: none; color: white; cursor: pointer; padding: 5px; align-items: center; justify-content: center; margin-right: 15px;">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" style="width: 24px; height: 24px;">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                    </svg>
                </button>

                <button class="bg-ele" id="liked-songs-tab"
                    style="color: #b3b3b3; cursor: pointer; transition: color 0.2s; font-weight: bold;">Liked
                    songs</button>
                <button class="bg-ele" id="trending-songs-tab"
                    style="color: white; cursor: pointer; transition: color 0.2s; font-weight: bold;">Trending
                    Songs</button>
                <!-- Hidden search input box container (resized to fit perfectly inside the pill header) -->
                <div id="search-container"
                    style="display: none; align-items: center; background: #2a2a2a; border-radius: 14px; height: 28px; padding: 0 10px; gap: 6px; margin-left: auto; margin-right: 10px; border: 1px solid #444; box-sizing: border-box;">
                    <img src="assets/search.svg" alt="" style="width: 12px; height: 12px; opacity: 0.7;">
                    <input type="text" id="search-input" placeholder="Search songs..."
                        style="background: transparent; border: none; color: white; outline: none; font-size: 12px; width: 100px; font-weight: normal; height: 100%;">
                    <button id="search-close-btn"
                        style="background: transparent; border: none; color: #b3b3b3; cursor: pointer; font-size: 10px; padding: 0 2px; font-weight: bold; display: flex; align-items: center; justify-content: center; height: 100%;">✕</button>
                </div>
                <!-- Search toggle icon button -->
                <button class="bg-ele search" id="header-search-btn"
                    style="margin-left: auto; margin-right: 8px; cursor: pointer;"><img src="assets/search.svg"
                        alt="Search"></button>
            </div>

            <div class="player border bg-ele " id="song-list-container"></div>
        </div>

        <div class="right border">
            <div class="account border bg-ele">
                <ul>
                    <li><img src="assets/user.svg" alt=""><span id="user-name-display">User Name</span></li>
                    <li><button class="bg-ele" id="logout-btn" style="cursor: pointer;">Log Out</button></li>
                </ul>
            </div>

            <div class="display border bg-ele"
                style="display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 25px 10px;">
                <ul
                    style="width: 100%; padding: 0; margin: 0; list-style: none; display: flex; flex-direction: column; align-items: center; gap: 15px;">
                    <!-- Wrap in relative positioning container for absolute overlay styling -->
                    <li
                        style="position: relative; width: 220px; height: 130px; margin: 0 auto; display: flex; justify-content: center; align-items: center;">
                        <!-- The YouTube video player will load directly inside this container -->
                        <div id="yt-player"></div>
                        <!-- Transparent overlay blocking native YouTube clicks/hovers and routing click-to-toggle play -->
                        <div id="video-overlay"
                            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; z-index: 10; background: transparent;">
                        </div>
                    </li>

                    <li class="controls-container"
                        style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                        <div class="controls">
                            <!-- Button triggering transition to the previous audio track (ID prev-btn) -->
                            <button class="control-btn" id="prev-btn" aria-label="Previous Track">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                    <rect x="4" y="5" width="2" height="14" rx="1" />
                                    <path d="M19 18V6L9 12L19 18Z" />
                                </svg>
                            </button>

                            <!-- Button triggering play actions (ID play-btn) -->
                            <button class="control-btn" id="play-btn" aria-label="Play">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M8 5V19L19 12L8 5Z" />
                                </svg>
                            </button>

                            <!-- Button triggering active playback suspension (ID pause-btn, hidden by default) -->
                            <button class="control-btn" id="pause-btn" aria-label="Pause" style="display: none;">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                    <rect x="6" y="5" width="3" height="14" rx="1.5" />
                                    <rect x="15" y="5" width="3" height="14" rx="1.5" />
                                </svg>
                            </button>

                            <!-- Button triggering next song skip actions (ID next-btn) -->
                            <button class="control-btn" id="next-btn" aria-label="Next Track">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M5 6V18L15 12L5 6Z" />
                                    <rect x="18" y="5" width="2" height="14" rx="1" />
                                </svg>
                            </button>
                        </div>

                        <!-- Range slider input acting as the track seeking scrubbing bar (ID seek-slider) -->
                        <input class="progress" id="seek-slider" type="range" min="0" max="100" value="0">
                    </li>

                    <!-- Glowing Animated Audio Visualizer (Pure White, Staggered Waves) -->
                    <li
                        style="width: 100%; display: flex; justify-content: center; align-items: center; margin-top: 5px;">
                        <div class="visualizer-container" id="visualizer-container">
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                    </li>

                    <!-- Display currently playing song name and artist (Liquid text styling) -->
                    <li style="width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: -5px; text-align: center; pointer-events: none;">
                        <span id="current-song-title" style="font-size: 13px; font-weight: bold; color: white; margin-bottom: 2px; text-align: center; width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);">No Song Playing</span>
                        <span id="current-song-artist" style="font-size: 10px; color: #b3b3b3; text-align: center; width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Choose a track to play</span>
                    </li>
                </ul>
            </div>

            <!-- Playback Utilities Deck (Separated secondary card below the player deck) -->
            <div class="utility-deck border bg-ele"
                style="display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px 10px; gap: 10px; flex-shrink: 0; margin-top: 5px;">
                <span
                    style="font-size: 11px; color: #b3b3b3; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; width: 100%; text-align: left; padding-left: 8px;">Playback
                    Utilities</span>
                <div
                    style="display: flex; justify-content: space-around; align-items: center; width: 100%; gap: 10px; padding: 5px 0;">
                    <!-- Shuffle Play Toggle -->
                    <button class="util-btn" id="shuffle-btn"
                        style="background: transparent; border: none; color: #b3b3b3; cursor: pointer; transition: color 0.2s, transform 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: bold;"
                        onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                            style="width: 18px; height: 18px;">
                            <path
                                d="M16 17.01V14.5L20 18.5L16 22.5V20H13C10.79 20 9 18.21 9 16V13C9 10.79 7.21 9 5 9H2V7H5C7.79 7 9.58 8.79 9.58 11V14C9.58 16.21 11.37 18 13.58 18H16ZM16 7.01V4.5L20 8.5L16 12.5V10H13.58C12.38 10 11.28 10.53 10.5 11.41L9.07 10C10.12 8.79 11.75 8 13.58 8H16ZM9.07 15.59L10.5 14.18C11.28 15.06 12.38 15.59 13.58 15.59H16V14L20 18L16 22V20.41H13.58C11.75 20.41 10.12 19.62 9.07 18.41L9.07 15.59Z" />
                        </svg>
                        <span>Shuffle</span>
                    </button>

                    <!-- Surprise Me / Random Play -->
                    <button class="util-btn" id="surprise-btn"
                        style="background: #2a2a2a; border: 1px solid #444; border-radius: 15px; color: white; padding: 6px 12px; cursor: pointer; transition: background 0.2s, transform 0.2s, box-shadow 0.2s; display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: bold;"
                        onmouseover="this.style.background='#3a3a3a'; this.style.transform='scale(1.05)'"
                        onmouseout="this.style.background='#2a2a2a'; this.style.transform='scale(1)'">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                            style="width: 14px; height: 14px;">
                            <path
                                d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM7 9C5.9 9 5 8.1 5 7C5 5.9 5.9 5 7 5C8.1 5 9 5.9 9 7C9 8.1 8.1 9 7 9ZM7 19C5.9 19 5 18.1 5 17C5 15.9 5.9 15 7 15C8.1 15 9 15.9 9 17C9 18.1 8.1 19 7 19ZM12 13C10.9 13 10 12.1 10 11C10 9.9 10.9 9 12 9C13.1 9 14 9.9 14 11C14 12.1 13.1 13 12 13ZM17 9C15.9 9 15 8.1 15 7C15 5.9 15.9 5 17 5C18.1 5 19 5.9 19 7C19 8.1 18.1 9 17 9ZM17 19C15.9 19 15 18.1 15 17C15 15.9 15.9 15 17 15C18.1 15 19 15.9 19 17C19 18.1 18.1 19 17 19Z" />
                        </svg>
                        <span>Surprise Me</span>
                    </button>

                    <!-- Repeat Play Toggle -->
                    <button class="util-btn" id="repeat-btn"
                        style="background: transparent; border: none; color: #b3b3b3; cursor: pointer; transition: color 0.2s, transform 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: bold;"
                        onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                            style="width: 18px; height: 18px;">
                            <path d="M7 7H17V10L21 6L17 2V5H5V11H7V7ZM17 17H7V14L3 18L7 22V19H19V13H17V17Z" />
                        </svg>
                        <span>Repeat</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Script tag importing our music player functions and data store (with v=17 cache buster) -->
    <script src="music_card.js?v=17"></script>

    <!-- Script tag importing the official YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
</body>

</html>
